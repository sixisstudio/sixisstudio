<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiXiS Studio — Tommy Ho Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 10px;
  }

  .header h2 {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: #fff;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #333;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .card-row {
    display: flex;
    gap: 40px;
    margin-bottom: 60px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }

  .card {
    width: 420px;
    height: 240px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
  }

  /* ============= FRONT ============= */
  .card-front {
    background: linear-gradient(145deg, #111111 0%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    position: relative;
  }

  .card-front .sq-left {
    position: absolute;
    left: 22px; top: 22px; bottom: 22px;
    width: 10px;
    border-left: 1.5px solid #00E5A0;
    border-top: 1.5px solid #00E5A0;
    border-bottom: 1.5px solid #00E5A0;
    opacity: 0.25;
  }

  .card-front .sq-right {
    position: absolute;
    right: 22px; top: 22px; bottom: 22px;
    width: 10px;
    border-right: 1.5px solid #00E5A0;
    border-top: 1.5px solid #00E5A0;
    border-bottom: 1.5px solid #00E5A0;
    opacity: 0.25;
  }

  .card-front .logo-line {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    z-index: 1;
  }

  .card-front .bracket {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 38px;
    color: #00E5A0;
    line-height: 1;
  }

  .card-front .logo-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 6px;
    color: #fff;
  }

  .card-front .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    z-index: 1;
  }

  .card-front .studio-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 8px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 14px;
    z-index: 1;
  }

  /* ============= BACK ============= */
  .card-back {
    background: linear-gradient(145deg, #111111 0%, #0a0a0a 100%);
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: stretch;
    padding: 28px 32px;
    position: relative;
  }

  .card-back .sq-left {
    position: absolute;
    left: 16px; top: 16px; bottom: 16px;
    width: 8px;
    border-left: 1px solid #00E5A0;
    border-top: 1px solid #00E5A0;
    border-bottom: 1px solid #00E5A0;
    opacity: 0.15;
  }

  .card-back .sq-right {
    position: absolute;
    right: 16px; top: 16px; bottom: 16px;
    width: 8px;
    border-right: 1px solid #00E5A0;
    border-top: 1px solid #00E5A0;
    border-bottom: 1px solid #00E5A0;
    opacity: 0.15;
  }

  .back-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
    z-index: 1;
  }

  .person-info h3 {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .person-info .title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: #00E5A0;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .contact-item .icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #333;
    width: 14px;
    text-align: center;
  }

  .contact-item .value {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.3px;
  }

  .back-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    z-index: 1;
  }

  .qr-wrapper {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .mini-logo {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .mini-logo .bracket {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 12px;
    color: #00E5A0;
  }

  .mini-logo .text {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 3px;
    color: #444;
  }

  .note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #333;
    text-align: center;
    margin-top: 10px;
    max-width: 500px;
    line-height: 1.6;
  }

  @media (max-width: 500px) {
    .card { width: 340px; height: 194px; }
    .card-row { gap: 24px; }
    .card-front .logo-text { font-size: 22px; }
    .card-front .bracket { font-size: 28px; }
  }
</style>
</head>
